<!DOCTYPE html>
<html lang="en">

<head>

    <title>1st Celebration!</title>
    <link rel="stylesheet" href="celbscd.css">
</head>

<body dir="rtl">

    <div class="card" onclick="toggleCard(this)">

        <h2>הפעם אני לוקח אותך לחוויה קצת אחרת</h2>

        <h3>לחץ עליי 💚</h3>

        <p class="card-text hidden">
            📅 19/06/2026 - 10:00<br>
            🌿 תתלבש בנוח<br>
            ✨ תביא מצב רוח טוב וסקרנות<br>
            ❤️ את כל השאר כבר סידרתי
        </p>

    <script>
        function toggleCard(card) {
            let text = card.querySelector(".card-text");
            text.classList.toggle("hidden");
        }
    </script>

</body>

</html>
