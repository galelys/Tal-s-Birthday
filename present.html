<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Present For You!</title>
    <link rel="stylesheet" href="present.css">
</head>

<body dir="rtl">


    <div class="container">

        <div class="gift">🎁</div>

        <h1> מחכה לך הפתעה...</h1>

        <p>

            יש סוד קטן שאני שומר כבר לא מעט זמן.

            בכל פעם שהזכרת אותו,

            בכל פעם שדיברת עליו,

            חייכתי לעצמי ולא אמרתי מילה.

            הגיע הזמן להתחיל לחשוף קצת... ❤️

        </p>

        <button id="hintBtn">רמז👀</button>

        <p id="hint" class="hidden">
            רמז קטן:
            עוד מעט יהיה לך הרבה יותר קל לעקוב אחרי הזמן...
            אבל בינתיים תצטרך להמשיך לנחש 😘
        </p>
    </div>


</body>
<script src="present.js"></script>

</html>
